add rom flash 0x0
flash generic 4K
flash load "main.bin"

add rwm ram 0xFFFF6000
ram generic 32K

add rwm data 0xF0000000
data generic 4K

add dsh2ecpu cpu0

add dsh2eintc intc0

cpu0 setintc intc0

add dsh2ewdt wdt 224

intc0 addintsrc 224 0 10

cpu0 addperipheral wdt
wdt addcpu cpu0

add rom handler_wdt 0x90000000
handler_wdt generic 4K
handler_wdt load "handler-wdt.bin"